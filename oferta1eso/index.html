<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador Educativo 1º ESO - V1.7</title>
    <!-- Librería de iconos Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --sidebar-bg: #ffffff;
            --accent-color: #1e293b;
            --text-color: #334155;
            --border-color: #e2e8f0;
            --bar-bg: #ffffff;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --icon-size: 18px;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Zona Izquierda: Selectores (1/3) */
        .sidebar {
            width: 33.33%;
            background-color: var(--sidebar-bg);
            padding: 2.5rem;
            box-sizing: border-box;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            z-index: 10;
        }

        .version-badge {
            display: inline-block;
            background: #f1f5f9;
            color: #64748b;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            align-self: flex-start;
            border: 1px solid var(--border-color);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            margin: 0;
            color: var(--accent-color);
            line-height: 1.2;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
            color: #94a3b8;
        }

        select {
            padding: 0.8rem;
            border-radius: 8px;
            border: 1.5px solid var(--border-color);
            background-color: #fff;
            font-size: 0.95rem;
            color: #1e293b;
            outline: none;
            cursor: pointer;
            transition: var(--transition);
        }

        select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        select:disabled {
            background-color: #f8fafc;
            cursor: not-allowed;
            color: #94a3b8;
        }

        /* Zona Derecha: Visualización (2/3) */
        .main-content {
            width: 66.66%;
            padding: 2.5rem;
            box-sizing: border-box;
            overflow-y: auto;
            background-color: var(--bg-color);
        }

        .subjects-container {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            max-width: 900px;
            margin: 0 auto;
        }

        .subject-row {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            animation: fadeInRight 0.5s ease-out forwards;
        }

        .subject-label {
            width: 280px;
            font-size: 0.95rem;
            text-align: right;
            font-weight: 500;
            color: #475569;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
        }

        .subject-icon {
            color: #64748b;
            flex-shrink: 0;
            width: var(--icon-size);
            height: var(--icon-size);
        }

        .bar-wrapper {
            flex-grow: 1;
            height: 42px;
            display: flex;
            align-items: center;
        }

        .bar {
            height: 100%;
            background-color: var(--bar-bg);
            border-radius: 10px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            padding: 0 1rem;
            box-sizing: border-box;
            transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-left: 6px solid #3b82f6;
            min-width: fit-content;
        }

        .flag-icon {
            width: 24px;
            height: auto;
            margin-right: 10px;
            border-radius: 2px;
            filter: drop-shadow(0 1px 1px rgba(0,0,0,0.1));
            flex-shrink: 0;
        }

        .hours-tag {
            margin-left: auto;
            font-size: 0.9rem;
            color: #64748b;
            font-weight: 700;
            white-space: nowrap;
        }

        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .info-footer {
            margin-top: auto;
            font-size: 0.8rem;
            color: #94a3b8;
            border-top: 1px solid var(--border-color);
            padding-top: 1.5rem;
            line-height: 1.5;
        }

    </style>
</head>
<body>

    <div class="container">
        <!-- Panel de Control -->
        <aside class="sidebar">
            <div class="version-badge">VERSIÓN 1.7</div>
            <h1>Reparto materias 1º ESO</h1>
            
            <div class="control-group">
                <label for="bilingue">Modalidad del centro</label>
                <select id="bilingue">
                    <option value="no">No Bilingüe</option>
                    <option value="si">Bilingüe (Inglés)</option>
                </select>
            </div>

            <div class="control-group">
                <label for="idioma1">Primer Idioma Extranjero</label>
                <select id="idioma1">
                    <option value="ingles">Inglés</option>
                    <option value="frances">Francés</option>
                </select>
            </div>

            <div class="control-group">
                <label>Segundo Idioma Extranjero</label>
                <select id="idioma2" disabled>
                    <option value="frances">Francés</option>
                    <option value="ingles">Inglés</option>
                </select>
            </div>

            <div class="control-group">
                <label for="religion">Religión / Atención Educativa</label>
                <select id="religion">
                    <option value="religion">Religión</option>
                    <option value="atencion">Atención Educativa</option>
                </select>
            </div>

            <div class="info-footer">
                <p>Visualización con proporcionalidad horaria estricta (1h = 25% de 4h) para una comparativa real.</p>
            </div>
        </aside>

        <!-- Área de Visualización -->
        <main class="main-content">
            <div id="subjects-list" class="subjects-container">
                <!-- Generado dinámicamente -->
            </div>
        </main>
    </div>

    <script>
        // Configuración de asignaturas fijas con sus respectivos iconos de Lucide
        const baseSubjects = [
            { id: 'mates', name: 'Matemáticas', icon: 'calculator', hours: 4, bilinguable: false },
            { id: 'lengua', name: 'Lengua Castellana y Literatura', icon: 'book-open', hours: 4, bilinguable: false },
            { id: 'geohist', name: 'Geografía e Historia', icon: 'globe', hours: 3, bilinguable: true },
            { id: 'biogeo', name: 'Biología y Geología', icon: 'microscope', hours: 3, bilinguable: true },
            { id: 'edfisica', name: 'Educación Física', icon: 'dumbbell', hours: 2, bilinguable: true },
            { id: 'musica', name: 'Música', icon: 'music', hours: 2, bilinguable: false },
            { id: 'plastica', name: 'Educación Plástica y Visual', icon: 'palette', hours: 1, bilinguable: false }
        ];

        // CDN de banderas robusto (FlagCDN)
        const flags = {
            es: 'https://flagcdn.com/es.svg',
            uk: 'https://flagcdn.com/gb.svg',
            fr: 'https://flagcdn.com/fr.svg'
        };

        const selectBilingue = document.getElementById('bilingue');
        const selectIdioma1 = document.getElementById('idioma1');
        const selectIdioma2 = document.getElementById('idioma2');
        const selectReligion = document.getElementById('religion');
        const container = document.getElementById('subjects-list');

        function render() {
            const isBilingue = selectBilingue.value === 'si';
            const lang1 = selectIdioma1.value;
            const lang2 = (lang1 === 'ingles') ? 'frances' : 'ingles';
            const optionRel = selectReligion.value;

            // Sincronizar select de segundo idioma
            selectIdioma2.value = lang2;

            // Crear lista completa siguiendo el orden solicitado
            let list = [...baseSubjects];

            // Idiomas
            list.push({
                id: 'idioma1',
                name: lang1 === 'ingles' ? 'Inglés (1ª Lengua)' : 'Francés (1ª Lengua)',
                icon: 'languages',
                hours: 4,
                isLanguage: true,
                langType: lang1
            });

            list.push({
                id: 'idioma2',
                name: lang2 === 'ingles' ? 'Inglés (2ª Lengua)' : 'Francés (2ª Lengua)',
                icon: 'languages',
                hours: 2,
                isLanguage: true,
                langType: lang2
            });

            // Optativas
            list.push({ id: 'opt1', name: 'Optativa I', icon: 'puzzle', hours: 2, bilinguable: false });
            list.push({ id: 'opt2', name: 'Optativa II', icon: 'puzzle', hours: 2, bilinguable: false });

            // Valores / Religión
            list.push({
                id: 'rel_ate',
                name: optionRel === 'religion' ? 'Religión' : 'Atención Educativa',
                icon: 'heart',
                hours: 1,
                bilinguable: false
            });

            // Tutoría siempre al final
            list.push({ id: 'tutoria', name: 'Tutoría', icon: 'users', hours: 1, bilinguable: false });

            // Renderizado en el DOM
            container.innerHTML = '';

            list.forEach((sub, index) => {
                const row = document.createElement('div');
                row.className = 'subject-row';
                row.style.animationDelay = `${index * 0.04}s`;

                // Etiqueta con Icono y Nombre
                const label = document.createElement('div');
                label.className = 'subject-label';
                label.innerHTML = `
                    <i data-lucide="${sub.icon}" class="subject-icon"></i>
                    <span>${sub.name}</span>
                `;

                const wrapper = document.createElement('div');
                wrapper.className = 'bar-wrapper';

                const bar = document.createElement('div');
                bar.className = 'bar';
                
                /** * AJUSTE DE PROPORCIONALIDAD V1.7:
                 * Para que sea proporcional (1h = 1/4 de 4h):
                 * Usamos un factor multiplicador directo sin base fija.
                 * Si 4h = 92% del contenedor, entonces 1h = 23%.
                 * 23% es suficiente para albergar la bandera y el texto sin atosigar.
                 */
                const targetWidth = sub.hours * 23;
                bar.style.width = '0%';

                // Lógica de asignación de banderas
                let currentFlag = flags.es;

                if (sub.isLanguage) {
                    currentFlag = (sub.langType === 'ingles') ? flags.uk : flags.fr;
                } else if (isBilingue && sub.bilinguable) {
                    currentFlag = flags.uk;
                } else {
                    currentFlag = flags.es;
                }

                bar.innerHTML = `
                    <img src="${currentFlag}" class="flag-icon" alt="flag">
                    <span class="hours-tag">${sub.hours}h</span>
                `;

                wrapper.appendChild(bar);
                row.appendChild(label);
                row.appendChild(wrapper);
                container.appendChild(row);

                // Disparar animación de crecimiento
                setTimeout(() => {
                    bar.style.width = `${targetWidth}%`;
                }, 50);
            });

            // Procesar los nuevos iconos insertados
            lucide.createIcons();
        }

        // Eventos de escucha
        [selectBilingue, selectIdioma1, selectReligion].forEach(el => {
            el.addEventListener('change', render);
        });

        // Carga inicial
        window.onload = render;
    </script>
</body>
</html>
